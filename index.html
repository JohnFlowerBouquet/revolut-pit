<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revolut Position Tracker</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Revolut Position Tracker</h1>
            <p>Upload your CSV report to view income from sells and other fees.</p>
        </header>

        <main>
            <div class="upload-section" id="drop-zone">
                <input type="file" id="file-input" accept=".csv" hidden>
                <div class="upload-content">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    <h3>Drag & Drop your CSV here</h3>
                    <p>or</p>
                    <button class="btn-primary" onclick="document.getElementById('file-input').click()">Browse Files</button>
                </div>
            </div>

            <div id="results-container" class="hidden">
                <div class="table-section">
                    <h2>Income from Sells</h2>
                    <div class="table-wrapper">
                        <table id="income-table">
                            <thead></thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>

                <div class="table-section">
                    <h2>Other income & fees</h2>
                    <div class="table-wrapper">
                        <table id="fees-table">
                            <thead></thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
